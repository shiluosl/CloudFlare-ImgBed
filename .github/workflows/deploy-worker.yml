name: Deploy Zero-Cost Worker

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      worker_name:
        description: Worker name override
        required: false
        default: ''

jobs:
  deploy:
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secret
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.skip != 'true'
      - uses: actions/setup-node@v5
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --omit=dev --omit=optional
      - name: Generate zero-cost Worker configuration
        if: steps.check.outputs.skip != 'true'
        env:
          WORKER_NAME: ${{ inputs.worker_name || secrets.WORKER_NAME }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          STORAGE_QUEUE_NAME: ${{ secrets.STORAGE_QUEUE_NAME }}
          WORKER_VARS: ${{ secrets.WORKER_VARS }}
        run: |
          node deploy/worker/generate-routes.js
          node deploy/worker/generate-toml.js
          npm run check:zero-cost
      - name: Deploy Worker
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config deploy/worker/wrangler.toml
