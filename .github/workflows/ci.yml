name: Zero-Cost DR CI

on:
  pull_request:
  push:
    branches: [main, feature/zero-cost-dr-v3]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check:migrations
      - run: npm run check:secrets
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
      - run: npx wrangler deploy --dry-run --config deploy/worker/wrangler.toml
