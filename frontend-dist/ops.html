<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storage Operations | CloudFlare-ImgBed</title>
  <style>
    :root { color-scheme: light; font-family: Arial, sans-serif; color: #172033; background: #f4f6f8; }
    body { margin: 0; } header, main { max-width: 1240px; margin: auto; padding: 18px; } header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #dbe1e8; gap:12px; } h1 { font-size:22px; margin:0; } h2 { font-size:16px; margin:0 0 12px; } h3 { font-size:14px; margin:14px 0 8px; }
    main { display:grid; gap:16px; } section { background:#fff; border:1px solid #dbe1e8; border-radius:6px; padding:14px; } .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:9px; } .stat { border-left:3px solid #1976d2; padding:8px 10px; background:#f8fafc; min-height:38px; } .label { color:#667085; font-size:12px; }
    table { border-collapse:collapse; width:100%; font-size:13px; } th,td { border-bottom:1px solid #e7ebef; padding:8px; text-align:left; vertical-align:top; } th { color:#475467; font-weight:600; } code { font-size:12px; word-break:break-all; } button { background:#1976d2; border:0; color:#fff; border-radius:4px; padding:7px 9px; cursor:pointer; white-space:nowrap; } button.secondary { background:#4b5563; } button.danger { background:#b42318; } button:disabled { opacity:.5; cursor:not-allowed; }
    .warning { color:#b54708; } .danger-text { color:#b42318; } .ok { color:#027a48; } #error { white-space:pre-wrap; color:#b42318; min-height:18px; } #notice { min-height:18px; color:#027a48; } form,.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; align-items:center; } input,select { padding:7px; border:1px solid #cbd5e1; border-radius:4px; min-width:110px; } details summary { cursor:pointer; color:#1976d2; } .muted { color:#667085; font-size:12px; } .pager { display:flex; gap:8px; align-items:center; margin-top:10px; } .wide { overflow-x:auto; } .hidden { display:none; } @media(max-width:680px) { header { align-items:flex-start; flex-direction:column; } table { min-width:690px; } }
  </style>
</head>
<body>
  <header><h1>Storage Operations</h1><button id="refresh" class="secondary" title="Refresh operational data">Refresh</button></header>
  <main>
    <div id="error" role="alert"></div><div id="notice" role="status"></div>
    <section><h2>Zero-Cost Protection</h2><div id="status" class="stats"></div><div id="forbidden" class="muted"></div></section>
    <section><h2>Storage Channels</h2><div id="channels" class="wide"></div><div id="channel-pager" class="pager"></div><form id="channel-form"><input name="name" required placeholder="Channel name"><select name="provider"><option value="webdav">WebDAV</option><option value="telegram">Telegram</option><option value="s3">S3 Compatible</option></select><input name="failureDomain" required placeholder="Failure domain"><input name="priority" type="number" placeholder="Priority"><input name="configJson" placeholder='Config JSON'><input name="secretRefsJson" placeholder='Secret refs JSON'><button>Add channel</button></form><div class="muted">S3-compatible providers may charge independently; Cloudflare R2 remains disabled.</div></section>
    <section><h2>Policies</h2><div id="policies" class="wide"></div><div id="policy-pager" class="pager"></div><form id="policy-form"><input name="id" type="hidden"><input name="name" required placeholder="Policy name"><input name="primaryChannelId" required placeholder="Primary channel ID"><input name="syncBackupChannelId" required placeholder="Sync backup channel ID"><input name="asyncChannelIds" placeholder="Async channel IDs, comma-separated"><select name="writeMode"><option value="safe">safe</option><option value="strict">strict</option><option value="fast">fast</option></select><input name="requiredCopies" type="number" min="1" max="2" value="2" required placeholder="Required copies"><input name="minimumReadableCopies" type="number" min="1" max="2" value="1" required placeholder="Minimum readable"><select name="autoRepair"><option value="true">Auto repair on</option><option value="false">Auto repair off</option></select><select name="stopWhenQuotaRisk"><option value="true">Stop on quota risk</option><option value="false">Continue on quota risk</option></select><button id="policy-submit">Add policy</button><button id="policy-reset" type="button" class="secondary">Clear</button></form></section>
    <section><h2>Files</h2><div class="toolbar"><select id="file-status"><option value="">All statuses</option><option>available</option><option>degraded</option><option>failed</option><option>deleting</option><option>delete_degraded</option><option>deleted</option></select><button id="file-filter" class="secondary">Filter</button></div><div id="files" class="wide"></div><div id="file-pager" class="pager"></div><div id="file-detail"></div></section>
    <section><h2>Task Center</h2><div class="toolbar"><select id="job-status"><option value="">All statuses</option><option>pending</option><option>queued</option><option>running</option><option>retry_wait</option><option>succeeded</option><option>dead</option><option>cancelled</option></select><select id="job-operation"><option value="">All operations</option><option>CREATE_REPLICA</option><option>VERIFY_REPLICA</option><option>REPAIR_REPLICA</option><option>DELETE_REPLICA</option><option>RECOUNT_FILE_HEALTH</option><option>RECONCILE_FILE</option></select><input id="job-channel" placeholder="Channel ID"><button id="job-filter" class="secondary">Filter</button><button id="retry-selected" class="secondary">Retry selected</button></div><div id="jobs" class="wide"></div><div id="job-pager" class="pager"></div></section>
    <section><h2>Audit Log</h2><div id="audits" class="wide"></div><div id="audit-pager" class="pager"></div></section>
  </main>
  <script>
    const state = { channels: 0, channelsNext: null, policies: 0, policiesNext: null, files: 0, filesNext: null, jobs: 0, jobsNext: null, audits: 0, auditsNext: null, selectedJobs: new Set() };
    const api = (path, options = {}) => fetch('/api/manage/ops/' + path, { credentials:'same-origin', ...options }).then(async response => { const data = await response.json().catch(() => ({})); if (!response.ok) throw new Error(data.error || response.statusText); return data; });
    const esc = value => String(value ?? '').replace(/[&<>"']/g, char => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;' })[char]);
    const table = (headers, rows) => `<table><thead><tr>${headers.map(esc).map(value => `<th>${value}</th>`).join('')}</tr></thead><tbody>${rows.join('') || `<tr><td colspan="${headers.length}">No records</td></tr>`}</tbody></table>`;
    const buttons = (id, hasMore, previous, action) => `<button class="secondary" ${previous === null ? 'disabled' : ''} data-page="${action}:prev">Previous</button><button class="secondary" ${hasMore ? '' : 'disabled'} data-page="${action}:next">Next</button><span class="muted">Cursor: ${esc(id || 0)}</span>`;
    const json = body => ({ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    function announce(message, error = false) { document.querySelector('#notice').textContent = error ? '' : message; document.querySelector('#error').textContent = error ? message : ''; }
    async function loadStatus() { const status = await api('status'); const usage = status.usage || {}; const values = [['Level',status.level],['Uploads',usage.uploads||0],['Worker requests',usage.worker_requests||0],['D1 reads',usage.d1_reads||0],['D1 writes',usage.d1_writes||0],['Queue operations',usage.queue_operations||0],['DB estimate',status.databaseBytesEstimate||0],['R2',status.r2Disabled?'Disabled':'Unexpected'],['Mode',status.readOnly?'Read-only':'Writable']]; document.querySelector('#status').innerHTML = values.map(([label,value]) => `<div class="stat"><div class="label">${esc(label)}</div><strong>${esc(value)}</strong></div>`).join(''); document.querySelector('#forbidden').textContent = status.forbiddenFeatures?.length ? `Paused: ${status.forbiddenFeatures.join(', ')}` : 'All permitted zero-cost operations are enabled.'; }
    async function loadChannels(cursor = state.channels) { const data = await api(`channels?limit=20&cursor=${cursor}`); state.channels = cursor; state.channelsNext = data.nextCursor; document.querySelector('#channels').innerHTML = table(['Name','Provider','Domain','Health','Priority','Capabilities','Last error','Actions'],data.items.map(c => `<tr><td>${esc(c.name)}</td><td>${esc(c.provider)}</td><td><input data-channel-domain value="${esc(c.failure_domain)}" maxlength="128" aria-label="Failure domain for ${esc(c.name)}"></td><td>${esc(c.health_status)}</td><td><input data-channel-priority type="number" min="0" max="100000" value="${esc(c.priority)}" aria-label="Priority for ${esc(c.name)}"></td><td><code>${esc(JSON.stringify(c.capabilities || {}))}</code></td><td>${esc(c.last_error_message || '-')}</td><td><button data-health="${esc(c.id)}">Check</button> <button class="secondary" data-toggle="${esc(c.id)}" data-enabled="${c.enabled}">${c.enabled?'Disable':'Enable'}</button> <button class="secondary" data-channel-update="${esc(c.id)}">Save</button></td></tr>`)); document.querySelector('#channel-pager').innerHTML = buttons(cursor,Boolean(data.nextCursor),cursor ? 0 : null,'channels'); }
    async function loadPolicies(cursor = state.policies) { const data = await api(`policies?limit=20&cursor=${cursor}`); state.policies = cursor; state.policiesNext = data.nextCursor; document.querySelector('#policies').innerHTML = table(['Name','Mode','Primary','Sync backup','Async','Required','Readable','Repair','Quota risk','Actions'],data.items.map(p => `<tr><td>${esc(p.name)}</td><td>${esc(p.write_mode)}</td><td><code>${esc(p.primary_channel_id)}</code></td><td><code>${esc(p.sync_backup_channel_id || '-')}</code></td><td><code>${esc((p.async_channels || []).join(', ') || '-')}</code></td><td>${esc(p.required_copies)}</td><td>${esc(p.minimum_readable_copies)}</td><td>${p.auto_repair?'On':'Off'}</td><td>${p.stop_when_quota_risk?'Stop':'Continue'}</td><td><button class="secondary" data-policy-edit="${esc(p.id)}" data-policy='${esc(JSON.stringify(p))}'>Edit</button></td></tr>`)); document.querySelector('#policy-pager').innerHTML = buttons(cursor,Boolean(data.nextCursor),cursor ? 0 : null,'policies'); }
    async function loadFiles(cursor = state.files) { const status = document.querySelector('#file-status').value; const query = new URLSearchParams({ limit:'20', cursor:String(cursor) }); if (status) query.set('status',status); const data = await api(`files?${query}`); state.files = cursor; state.filesNext = data.nextCursor; document.querySelector('#files').innerHTML = table(['File','Status','Size','URL','Actions'],data.items.map(f => `<tr><td>${esc(f.name)}</td><td>${esc(f.status)}</td><td>${esc(f.size)}</td><td><a href="/file/${encodeURIComponent(f.id)}"><code>/file/${esc(f.id)}</code></a></td><td><button data-file="${esc(f.id)}">Details</button> <button class="danger" data-delete-file="${esc(f.id)}">Delete</button></td></tr>`)); document.querySelector('#file-pager').innerHTML = buttons(cursor,Boolean(data.nextCursor),cursor ? 0 : null,'files'); }
    async function loadJobs(cursor = state.jobs) { const query = new URLSearchParams({limit:'20',cursor:String(cursor)}); for (const [key,id] of [['status','job-status'],['operation','job-operation'],['channelId','job-channel']]) { const value=document.querySelector('#'+id).value; if(value) query.set(key,value); } const data=await api(`jobs?${query}`); state.jobs=cursor; state.jobsNext=data.nextCursor; document.querySelector('#jobs').innerHTML=table(['','Operation','Status','File','Channel','Attempts','Next run','Error','Action'],data.items.map(j=>`<tr><td><input type="checkbox" data-job-select="${esc(j.id)}" ${state.selectedJobs.has(j.id)?'checked':''}></td><td>${esc(j.operation)}</td><td>${esc(j.status)}</td><td><code>${esc(j.file_id)}</code></td><td><code>${esc(j.channel_id||'-')}</code></td><td>${esc(j.attempts)}/${esc(j.max_attempts)}</td><td>${esc(j.run_after)}</td><td>${esc(j.last_error_message||'-')}</td><td>${['dead','retry_wait'].includes(j.status)?`<button data-retry="${esc(j.id)}">Retry</button>`:''} ${['pending','queued','retry_wait'].includes(j.status)?`<button class="secondary" data-cancel="${esc(j.id)}">Cancel</button>`:''}</td></tr>`)); document.querySelector('#job-pager').innerHTML=buttons(cursor,Boolean(data.nextCursor),cursor?0:null,'jobs'); }
    async function loadAudits(cursor = state.audits) { const data=await api(`audit?limit=20&cursor=${cursor}`); state.audits=cursor; state.auditsNext=data.nextCursor; document.querySelector('#audits').innerHTML=table(['When','Action','Target','Details'],data.items.map(a=>`<tr><td>${esc(a.created_at)}</td><td>${esc(a.action)}</td><td><code>${esc(a.target_type)}:${esc(a.target_id||'-')}</code></td><td><code>${esc(a.details_json)}</code></td></tr>`)); document.querySelector('#audit-pager').innerHTML=buttons(cursor,Boolean(data.nextCursor),cursor?0:null,'audits'); }
    async function showFile(id) { const data=await api(`files?fileId=${encodeURIComponent(id)}`); const replicas=data.replicas || []; document.querySelector('#file-detail').innerHTML=`<h3>Replica details: ${esc(data.file.name)}</h3>${table(['Role','Provider','Status','Checked','Error','Actions'],replicas.map(r=>`<tr><td>${esc(r.role)}</td><td>${esc(r.provider)}</td><td>${esc(r.status)}</td><td>${esc(r.lastCheckedAt||'-')}</td><td>${esc(r.lastErrorMessage||'-')}</td><td><button data-replica-action="verify" data-file-id="${esc(id)}" data-replica-id="${esc(r.id)}">Verify</button> <button class="secondary" data-replica-action="repair" data-file-id="${esc(id)}" data-replica-id="${esc(r.id)}">Repair</button> ${r.status==='healthy'&&r.role!=='primary'?`<button class="secondary" data-replica-action="switch_primary" data-file-id="${esc(id)}" data-replica-id="${esc(r.id)}">Make primary</button>`:''}</td></tr>`))}`; }
    async function loadAll() { announce(''); await Promise.all([loadStatus(),loadChannels(),loadPolicies(),loadFiles(),loadJobs(),loadAudits()]); }
    function resetPolicyForm() { const form=document.querySelector('#policy-form'); form.reset(); form.elements.id.value=''; form.elements.requiredCopies.value='2'; form.elements.minimumReadableCopies.value='1'; form.elements.autoRepair.value='true'; form.elements.stopWhenQuotaRisk.value='true'; document.querySelector('#policy-submit').textContent='Add policy'; }
    document.addEventListener('click', async event => { const button=event.target.closest('button'); if(!button) return; try { if(button.dataset.health) await api('channels',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelId:button.dataset.health,action:'health_check'})}); else if(button.dataset.toggle) await api('channels',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelId:button.dataset.toggle,action:button.dataset.enabled==='1'?'disable':'enable'})}); else if(button.dataset.channelUpdate) { const row=button.closest('tr'); await api('channels',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({channelId:button.dataset.channelUpdate,action:'update',failureDomain:row.querySelector('[data-channel-domain]').value,priority:row.querySelector('[data-channel-priority]').value})}); } else if(button.dataset.file) await showFile(button.dataset.file); else if(button.dataset.deleteFile) { if(confirm('Create a tombstone and delete all replicas?')) await api(`files?fileId=${encodeURIComponent(button.dataset.deleteFile)}`,{method:'DELETE'}); } else if(button.dataset.retry) await api('jobs',json({jobId:button.dataset.retry,action:'retry'})); else if(button.dataset.cancel) await api('jobs',json({jobId:button.dataset.cancel,action:'cancel'})); else if(button.dataset.replicaAction) await api('files',json({fileId:button.dataset.fileId,replicaId:button.dataset.replicaId,action:button.dataset.replicaAction})); else if(button.dataset.page) { const [name,direction]=button.dataset.page.split(':'); const next=direction==='next'?state[`${name}Next`]:0; if(next!==null) await ({channels:loadChannels,policies:loadPolicies,files:loadFiles,jobs:loadJobs,audits:loadAudits}[name])(next); return; } else if(button.id==='refresh') { await loadAll(); return; } else if(button.id==='file-filter') { await loadFiles(0); return; } else if(button.id==='job-filter') { await loadJobs(0); return; } else if(button.id==='retry-selected') { const jobIds=[...state.selectedJobs]; if(jobIds.length) await api('jobs',json({jobIds,action:'retry_batch'})); state.selectedJobs.clear(); } else if(button.dataset.policyEdit) { const p=JSON.parse(button.dataset.policy); const form=document.querySelector('#policy-form'); form.elements.id.value=p.id; form.elements.name.value=p.name; form.elements.primaryChannelId.value=p.primary_channel_id; form.elements.syncBackupChannelId.value=p.sync_backup_channel_id || ''; form.elements.asyncChannelIds.value=(p.async_channels || []).join(', '); form.elements.writeMode.value=p.write_mode; form.elements.requiredCopies.value=p.required_copies; form.elements.minimumReadableCopies.value=p.minimum_readable_copies; form.elements.autoRepair.value=String(Boolean(p.auto_repair)); form.elements.stopWhenQuotaRisk.value=String(Boolean(p.stop_when_quota_risk)); document.querySelector('#policy-submit').textContent='Save policy'; form.scrollIntoView({behavior:'smooth',block:'center'}); return; } else if(button.id==='policy-reset') { resetPolicyForm(); return; } await loadAll(); announce('Operation completed.'); } catch(error) { announce(error.message,true); } });
    document.addEventListener('change', event => { if(event.target.matches('[data-job-select]')) { if(event.target.checked) state.selectedJobs.add(event.target.dataset.jobSelect); else state.selectedJobs.delete(event.target.dataset.jobSelect); } });
    document.querySelector('#channel-form').addEventListener('submit',async event=>{event.preventDefault();try { const raw=Object.fromEntries(new FormData(event.target)); const body={...raw,priority:raw.priority?Number(raw.priority):undefined,config:raw.configJson?JSON.parse(raw.configJson):{},secretRefs:raw.secretRefsJson?JSON.parse(raw.secretRefsJson):{}}; delete body.configJson; delete body.secretRefsJson; await api('channels',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); event.target.reset(); await loadAll(); announce('Channel added.'); } catch(error) { announce(error.message,true); }});
    document.querySelector('#policy-form').addEventListener('submit',async event=>{event.preventDefault();try { const raw=Object.fromEntries(new FormData(event.target)); const body={...raw,asyncChannelIds:raw.asyncChannelIds.split(',').map(value=>value.trim()).filter(Boolean),requiredCopies:Number(raw.requiredCopies),minimumReadableCopies:Number(raw.minimumReadableCopies),autoRepair:raw.autoRepair==='true',stopWhenQuotaRisk:raw.stopWhenQuotaRisk==='true'}; const method=body.id?'PATCH':'POST'; if(!body.id) delete body.id; await api('policies',{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); resetPolicyForm(); await loadAll(); announce(method==='PATCH'?'Policy updated.':'Policy added.'); } catch(error) { announce(error.message,true); }});
    loadAll().catch(error=>announce(error.message,true));
  </script>
</body>
</html>
