<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>V3 Upload | CloudFlare-ImgBed</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #18212f; background: #f4f7fa; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    main { width: min(100%, 720px); background: #fff; border: 1px solid #dce3ea; border-radius: 8px; box-shadow: 0 8px 24px rgba(24, 33, 47, .08); padding: 32px; }
    h1 { margin: 0 0 8px; font-size: 24px; font-weight: 650; }
    p { margin: 0 0 24px; line-height: 1.55; color: #526170; }
    form { display: grid; gap: 16px; }
    label { display: grid; gap: 8px; font-weight: 600; }
    input[type="password"], input[type="file"] { width: 100%; min-height: 42px; padding: 9px 11px; border: 1px solid #b8c4d0; border-radius: 6px; color: inherit; background: #fff; font: inherit; }
    button { justify-self: start; min-height: 40px; padding: 8px 16px; border: 0; border-radius: 6px; background: #1769aa; color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
    button[disabled] { opacity: .55; cursor: progress; }
    .hint { font-size: 13px; color: #697886; }
    .status { min-height: 24px; margin: 18px 0 0; line-height: 1.5; }
    .status.error { color: #b42318; }
    .status.success { color: #027a48; }
    .results { display: grid; gap: 10px; margin: 18px 0 0; padding: 0; list-style: none; }
    .results li { border-left: 3px solid #1769aa; background: #f7fafc; padding: 10px 12px; overflow-wrap: anywhere; }
    .results a { color: #0b5f9c; }
    [hidden] { display: none !important; }
    @media (max-width: 560px) { body { padding: 16px; } main { padding: 24px 20px; } }
  </style>
</head>
<body>
  <main>
    <section id="login-panel">
      <h1>V3 文件上传</h1>
      <p>请输入上传密码后继续。上传会写入 V3 主副本与同步备份副本。</p>
      <form id="login-form">
        <label>上传密码<input id="auth-code" type="password" name="authCode" autocomplete="current-password" required></label>
        <button id="login-button" type="submit">验证并进入</button>
      </form>
      <p id="login-status" class="status" role="status" aria-live="polite"></p>
    </section>

    <section id="upload-panel" hidden>
      <h1>V3 文件上传</h1>
      <p>文件将通过统一逻辑地址提供访问。单次最多 5 个文件，默认单文件最大 10 MiB。</p>
      <form id="upload-form">
        <label>选择文件<input id="upload-files" type="file" name="file" multiple required></label>
        <span class="hint">支持的类型由服务端 V3 上传策略决定。</span>
        <button id="upload-button" type="submit">上传文件</button>
      </form>
      <p id="upload-status" class="status" role="status" aria-live="polite"></p>
      <ul id="results" class="results" aria-live="polite"></ul>
    </section>
  </main>
  <script>
    const loginPanel = document.getElementById('login-panel');
    const uploadPanel = document.getElementById('upload-panel');
    const loginForm = document.getElementById('login-form');
    const uploadForm = document.getElementById('upload-form');
    const loginStatus = document.getElementById('login-status');
    const uploadStatus = document.getElementById('upload-status');
    const results = document.getElementById('results');

    function showUploader() {
      loginPanel.hidden = true;
      uploadPanel.hidden = false;
      document.getElementById('upload-files').focus();
    }

    function setStatus(element, message, kind) {
      element.textContent = message || '';
      element.className = `status${kind ? ` ${kind}` : ''}`;
    }

    async function hasSession() {
      try {
        const response = await fetch('/api/auth/sessionCheck', { credentials: 'same-origin', cache: 'no-store' });
        const session = await response.json();
        return response.ok && session.valid;
      } catch { return false; }
    }

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      const button = document.getElementById('login-button');
      button.disabled = true;
      setStatus(loginStatus, '正在验证上传密码...');
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ authCode: document.getElementById('auth-code').value }),
        });
        if (!response.ok) throw new Error(response.status === 401 ? '上传密码不正确。' : '暂时无法验证上传密码。');
        loginForm.reset();
        showUploader();
      } catch (error) {
        setStatus(loginStatus, error.message, 'error');
      } finally { button.disabled = false; }
    });

    uploadForm.addEventListener('submit', async event => {
      event.preventDefault();
      const input = document.getElementById('upload-files');
      if (input.files.length > 5) {
        setStatus(uploadStatus, '一次最多上传 5 个文件。', 'error');
        return;
      }
      const button = document.getElementById('upload-button');
      button.disabled = true;
      results.replaceChildren();
      setStatus(uploadStatus, '正在上传并创建同步副本...');
      try {
        const formData = new FormData();
        for (const file of input.files) formData.append('file', file);
        const response = await fetch('/api/upload/v3', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Idempotency-Key': crypto.randomUUID() },
          body: formData,
        });
        const payload = await response.json();
        if (response.status === 401) { uploadPanel.hidden = true; loginPanel.hidden = false; throw new Error('登录已失效，请重新验证上传密码。'); }
        if (!response.ok && response.status !== 207) throw new Error(payload.error || '上传失败。');
        const items = payload.items || [payload];
        for (const item of items) {
          const row = document.createElement('li');
          if (item.error) row.textContent = `${item.name || '文件'}：${item.error}`;
          else {
            const link = document.createElement('a');
            link.href = item.url;
            link.textContent = item.url;
            link.target = '_blank';
            link.rel = 'noopener';
            row.append(document.createTextNode(`${item.file.name} (${item.file.status})：`), link);
          }
          results.append(row);
        }
        setStatus(uploadStatus, payload.partial ? '部分文件上传失败，请查看结果。' : '上传完成。', payload.partial ? 'error' : 'success');
        if (!payload.partial) uploadForm.reset();
      } catch (error) {
        setStatus(uploadStatus, error.message, 'error');
      } finally { button.disabled = false; }
    });

    hasSession().then(valid => { if (valid) showUploader(); });
  </script>
</body>
</html>
